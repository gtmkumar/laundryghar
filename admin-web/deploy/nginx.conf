server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Vite emits content-hashed filenames under /assets — cache them hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: every non-file route is handled by the React router.
    # index.html must never be cached so new deploys take effect immediately.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # Security headers (mirrors the API's UseSecurityHeaders).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
