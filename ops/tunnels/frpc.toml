# frpc.toml — frp CLIENT config, run on YOUR laptop alongside scripts/run-stack.sh.
#
# TEMPLATE — copy to frpc.local.toml (gitignored via `*.local`) and set the
# same token as frps.local.toml on the VPS. scripts/run-tunnels.sh reads
# frpc.local.toml if present, else falls back to this file.
#
# Ports below match scripts/run-stack.sh exactly (5056/5015/5242/5174/8081).

serverAddr = "187.127.154.205"
serverPort = 7000
auth.method = "token"
auth.token = "CHANGE_ME_LONG_RANDOM_TOKEN"

[[proxies]]
name = "core"
type = "http"
localIP = "127.0.0.1"
localPort = 5056
customDomains = ["dev-core.trywavio.in"]

[[proxies]]
name = "operations"
type = "http"
localIP = "127.0.0.1"
localPort = 5015
customDomains = ["dev-ops.trywavio.in"]

[[proxies]]
name = "commerce"
type = "http"
localIP = "127.0.0.1"
localPort = 5242
customDomains = ["dev-commerce.trywavio.in"]

[[proxies]]
name = "admin-web"
type = "http"
localIP = "127.0.0.1"
localPort = 5174
customDomains = ["dev-admin.trywavio.in"]

[[proxies]]
name = "metro"
type = "http"
localIP = "127.0.0.1"
localPort = 8081
customDomains = ["dev-metro.trywavio.in"]

# ── Other local projects tunneled through the same VPS/frps, ngrok-style
#    (bare <name>.trywavio.in prefixes, not the dev-* laundryghar-stack convention above).
[[proxies]]
name = "laundryghar-site"
type = "http"
localIP = "127.0.0.1"
localPort = 5080
customDomains = ["laundryghar.trywavio.in"]

[[proxies]]
name = "docsolt"
type = "http"
localIP = "127.0.0.1"
localPort = 5069
customDomains = ["docsolt.trywavio.in"]

[[proxies]]
name = "snapaccount"
type = "http"
localIP = "127.0.0.1"
localPort = 5070
customDomains = ["snapaccount.trywavio.in"]
