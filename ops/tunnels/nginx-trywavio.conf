# nginx-trywavio.conf — reverse proxy for trywavio.in on the VPS (187.127.154.205).
#
# Deploy: cp to /etc/nginx/sites-available/trywavio.conf, then
#   ln -s /etc/nginx/sites-available/trywavio.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
# Then run certbot (see ops/tunnels/README.md) — it rewrites these blocks in
# place to add the 443 server + http->https redirect, so start on plain :80.
#
# This is the "reverse proxy / LB" that deploy/README.md calls out as the
# still-missing piece in front of the gateway/admin-web containers.

# ── dev-* subdomains: proxy to frps' local HTTP vhost port. frps demuxes to
#    the right frpc-tunneled local service by Host header (customDomains in
#    ops/tunnels/frpc.toml). Requires frps running with vhostHTTPPort = 7100.
server {
    listen 80;
    server_name dev-core.trywavio.in dev-ops.trywavio.in dev-commerce.trywavio.in
                dev-admin.trywavio.in dev-metro.trywavio.in;

    location / {
        proxy_pass http://127.0.0.1:7100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}

# ── api.trywavio.in: the VPS's own docker-compose gateway (deploy/docker-compose.yml,
#    GATEWAY_PORT default 8080). Only add this block once that stack is deployed here.
server {
    listen 80;
    server_name api.trywavio.in;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── admin.trywavio.in: the VPS's own docker-compose admin-web (ADMIN_WEB_PORT
#    default 8081). Same caveat as above.
server {
    listen 80;
    server_name admin.trywavio.in;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
